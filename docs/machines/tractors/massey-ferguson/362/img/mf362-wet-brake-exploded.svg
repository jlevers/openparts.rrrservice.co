<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <style>
    .part { fill: none; stroke: #111; stroke-width: 1.5; }
    .part-fill { fill: #f5f5f5; stroke: #111; stroke-width: 1.5; }
    .friction { fill: #c49a6c; stroke: #111; stroke-width: 1.5; }
    .steel { fill: #d0d0d0; stroke: #111; stroke-width: 1.5; }
    .label { font-size: 11px; fill: #111; font-weight: 700; letter-spacing: 0.04em; }
    .label-sm { font-size: 9px; fill: #333; }
    .partno { font-size: 9px; fill: #1E6A24; font-weight: 700; font-family: 'Roboto Mono', monospace; }
    .leader { stroke: #888; stroke-width: 0.75; fill: none; }
    .leader-dot { fill: #888; }
    .title { font-size: 14px; fill: #1E6A24; font-weight: 900; letter-spacing: 0.08em; }
    .subtitle { font-size: 10px; fill: #555; letter-spacing: 0.03em; }
    .dim { font-size: 8px; fill: #888; font-style: italic; }
    .centerline { stroke: #bbb; stroke-width: 0.5; stroke-dasharray: 8,4; }
    .section-bg { fill: #fafafa; stroke: #eee; stroke-width: 1; }
    .callout-bg { fill: white; stroke: #ddd; stroke-width: 0.75; }
  </style>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" class="title">MF 362 WET BRAKE ASSEMBLY — EXPLODED VIEW</text>
  <text x="400" y="44" text-anchor="middle" class="subtitle">One side shown. Mirror for opposite side. Pre-B33001: 3 friction discs. Post-B33001: 4 friction discs.</text>

  <!-- Centerline -->
  <line x1="100" y1="280" x2="700" y2="280" class="centerline"/>

  <!-- === AXLE HOUSING (background) === -->
  <rect x="60" y="130" width="120" height="300" rx="6" class="part-fill" style="fill:#e8e8e8"/>
  <text x="120" y="160" text-anchor="middle" class="label">AXLE</text>
  <text x="120" y="172" text-anchor="middle" class="label">HOUSING</text>

  <!-- === BRAKE ACTUATOR === -->
  <!-- Housing body -->
  <rect x="190" y="175" width="70" height="210" rx="3" class="part-fill"/>
  <!-- Ramp pockets (simplified) -->
  <circle cx="210" cy="230" r="8" class="part" style="fill:#e0e0e0"/>
  <circle cx="240" cy="250" r="8" class="part" style="fill:#e0e0e0"/>
  <circle cx="210" cy="310" r="8" class="part" style="fill:#e0e0e0"/>
  <circle cx="240" cy="330" r="8" class="part" style="fill:#e0e0e0"/>

  <!-- Actuating balls -->
  <circle cx="210" cy="230" r="5" style="fill:#666; stroke:#111; stroke-width:1"/>
  <circle cx="240" cy="250" r="5" style="fill:#666; stroke:#111; stroke-width:1"/>
  <circle cx="210" cy="310" r="5" style="fill:#666; stroke:#111; stroke-width:1"/>
  <circle cx="240" cy="330" r="5" style="fill:#666; stroke:#111; stroke-width:1"/>

  <!-- Return springs -->
  <path d="M218,195 L218,210 M222,195 L222,210" class="part" style="stroke-width:2"/>
  <path d="M218,350 L218,365 M222,350 L222,365" class="part" style="stroke-width:2"/>

  <!-- === DISC STACK (exploded, spaced apart) === -->
  <!-- Separator plate 1 -->
  <rect x="280" y="190" width="8" height="180" rx="1" class="steel"/>

  <!-- Friction disc 1 -->
  <rect x="305" y="195" width="12" height="170" rx="1" class="friction"/>
  <!-- Spline teeth (simplified) -->
  <line x1="305" y1="210" x2="317" y2="210" style="stroke:#8B6914; stroke-width:0.5"/>
  <line x1="305" y1="230" x2="317" y2="230" style="stroke:#8B6914; stroke-width:0.5"/>
  <line x1="305" y1="250" x2="317" y2="250" style="stroke:#8B6914; stroke-width:0.5"/>
  <line x1="305" y1="310" x2="317" y2="310" style="stroke:#8B6914; stroke-width:0.5"/>
  <line x1="305" y1="330" x2="317" y2="330" style="stroke:#8B6914; stroke-width:0.5"/>
  <line x1="305" y1="350" x2="317" y2="350" style="stroke:#8B6914; stroke-width:0.5"/>

  <!-- Separator plate 2 -->
  <rect x="335" y="190" width="8" height="180" rx="1" class="steel"/>

  <!-- Friction disc 2 -->
  <rect x="360" y="195" width="12" height="170" rx="1" class="friction"/>
  <line x1="360" y1="210" x2="372" y2="210" style="stroke:#8B6914; stroke-width:0.5"/>
  <line x1="360" y1="250" x2="372" y2="250" style="stroke:#8B6914; stroke-width:0.5"/>
  <line x1="360" y1="330" x2="372" y2="330" style="stroke:#8B6914; stroke-width:0.5"/>

  <!-- Separator plate 3 -->
  <rect x="390" y="190" width="8" height="180" rx="1" class="steel"/>

  <!-- Friction disc 3 -->
  <rect x="415" y="195" width="12" height="170" rx="1" class="friction"/>
  <line x1="415" y1="210" x2="427" y2="210" style="stroke:#8B6914; stroke-width:0.5"/>
  <line x1="415" y1="250" x2="427" y2="250" style="stroke:#8B6914; stroke-width:0.5"/>
  <line x1="415" y1="330" x2="427" y2="330" style="stroke:#8B6914; stroke-width:0.5"/>

  <!-- === SLAVE CYLINDER === -->
  <rect x="450" y="200" width="55" height="160" rx="3" class="part-fill" style="fill:#ddd"/>
  <!-- Piston -->
  <rect x="445" y="240" width="10" height="80" rx="1" class="part-fill" style="fill:#aaa"/>
  <!-- Hydraulic port -->
  <circle cx="500" cy="280" r="6" class="part" style="fill:#e8e8e8"/>
  <line x1="506" y1="280" x2="530" y2="280" class="part" style="stroke-width:2"/>

  <!-- === MASTER CYLINDER (schematic) === -->
  <rect x="540" y="240" width="90" height="80" rx="3" class="part-fill"/>
  <!-- Bore -->
  <rect x="545" y="262" width="80" height="16" rx="2" class="part" style="fill:#e0e0e0"/>
  <!-- Piston -->
  <rect x="600" y="264" width="20" height="12" rx="1" class="part-fill" style="fill:#aaa"/>
  <!-- Ports -->
  <circle cx="560" cy="275" r="3" style="fill:#1E6A24; stroke:#111; stroke-width:0.75"/>
  <circle cx="575" cy="275" r="3" style="fill:#1E6A24; stroke:#111; stroke-width:0.75"/>
  <!-- Push rod -->
  <line x1="620" y1="270" x2="650" y2="270" class="part" style="stroke-width:2"/>

  <!-- Brake pedal (simplified) -->
  <path d="M650,270 L670,230 L690,230" class="part" style="stroke-width:2; fill:none"/>
  <rect x="685" y="222" width="20" height="16" rx="2" class="part-fill" style="fill:#ccc"/>

  <!-- ============ LEADER LINES & LABELS ============ -->

  <!-- Actuator housing -->
  <circle cx="225" cy="180" r="2" class="leader-dot"/>
  <polyline points="225,180 225,100 160,100" class="leader"/>
  <rect x="42" y="88" width="120" height="30" rx="0" class="callout-bg"/>
  <text x="50" y="101" class="label">BRAKE ACTUATOR</text>
  <text x="50" y="112" class="partno">1860963M91</text>

  <!-- Actuating balls -->
  <circle cx="240" cy="250" r="2" class="leader-dot"/>
  <polyline points="248,250 270,82 210,82" class="leader"/>
  <rect x="42" y="62" width="170" height="16" rx="0" class="callout-bg"/>
  <text x="50" y="74" class="label">BALLS (7/8") <tspan class="partno">1886562M1</tspan> <tspan class="dim">×6/SIDE</tspan></text>

  <!-- Return springs -->
  <circle cx="220" cy="360" r="2" class="leader-dot"/>
  <polyline points="220,365 220,420 160,420" class="leader"/>
  <rect x="32" y="408" width="130" height="30" rx="0" class="callout-bg"/>
  <text x="40" y="421" class="label">RETURN SPRINGS</text>
  <text x="40" y="432" class="partno">1853148M1 <tspan class="dim">×4/SIDE</tspan></text>

  <!-- Friction disc -->
  <circle cx="311" cy="195" r="2" class="leader-dot"/>
  <polyline points="311,195 311,78 380,78" class="leader"/>
  <rect x="378" y="62" width="190" height="30" rx="0" class="callout-bg"/>
  <text x="386" y="75" class="label">FRICTION DISC (SINTERED)</text>
  <text x="386" y="86" class="partno">1860964M2 <tspan class="dim">223mm OD × 5mm × 27-SPL</tspan></text>

  <!-- Separator plate -->
  <circle cx="284" cy="370" r="2" class="leader-dot"/>
  <polyline points="284,375 284,450 380,450" class="leader"/>
  <rect x="378" y="438" width="200" height="30" rx="0" class="callout-bg"/>
  <text x="386" y="451" class="label">STEEL SEPARATOR PLATE</text>
  <text x="386" y="462" class="partno">1860965M2 <tspan class="dim">247mm OD × 127mm ID × 3mm</tspan></text>

  <!-- Slave cylinder -->
  <circle cx="477" cy="200" r="2" class="leader-dot"/>
  <polyline points="477,200 477,120 530,120" class="leader"/>
  <rect x="528" y="108" width="140" height="30" rx="0" class="callout-bg"/>
  <text x="536" y="121" class="label">SLAVE CYLINDER</text>
  <text x="536" y="132" class="label-sm">SEAL KIT REBUILD <tspan class="dim">~$10-15</tspan></text>

  <!-- Master cylinder -->
  <circle cx="585" cy="240" r="2" class="leader-dot"/>
  <polyline points="585,240 585,162 640,162" class="leader"/>
  <rect x="638" y="148" width="155" height="30" rx="0" class="callout-bg"/>
  <text x="646" y="161" class="label">MASTER CYLINDER</text>
  <text x="646" y="172" class="partno">3596785M92 <tspan class="dim">(1/2"-24 PORTS)</tspan></text>

  <!-- Master cyl seal kit -->
  <circle cx="570" cy="320" r="2" class="leader-dot"/>
  <polyline points="570,320 570,390 640,390" class="leader"/>
  <rect x="638" y="378" width="155" height="30" rx="0" class="callout-bg"/>
  <text x="646" y="391" class="label">SEAL KIT (REBUILD)</text>
  <text x="646" y="402" class="partno">1810849M91 <tspan class="dim">MINERAL FLUID ONLY</tspan></text>

  <!-- Brake pedal -->
  <circle cx="695" cy="222" r="2" class="leader-dot"/>
  <polyline points="695,222 720,200 755,200" class="leader"/>
  <text x="720" y="196" class="label-sm">PEDAL</text>

  <!-- Hydraulic line label -->
  <text x="520" y="296" class="dim">HYDRAULIC LINE</text>

  <!-- Disc stack bracket -->
  <line x1="278" y1="140" x2="278" y2="150" class="leader"/>
  <line x1="278" y1="145" x2="430" y2="145" class="leader"/>
  <line x1="430" y1="140" x2="430" y2="150" class="leader"/>
  <text x="354" y="140" text-anchor="middle" class="dim">DISC STACK: 3 FRICTION + 3 STEEL (PRE-B33001)</text>

  <!-- Legend -->
  <rect x="30" y="478" width="740" height="30" rx="0" style="fill:#fafafa; stroke:#ddd; stroke-width:1"/>
  <rect x="45" y="488" width="14" height="10" class="friction"/>
  <text x="64" y="497" class="label-sm">FRICTION DISC</text>
  <rect x="145" y="488" width="14" height="10" class="steel"/>
  <text x="164" y="497" class="label-sm">STEEL PLATE</text>
  <circle cx="257" cy="493" r="4" style="fill:#666; stroke:#111; stroke-width:1"/>
  <text x="266" y="497" class="label-sm">ACTUATING BALL</text>
  <text x="380" y="497" class="partno">GREEN = PART NUMBER</text>
  <text x="530" y="497" class="dim">ITALIC = DIMENSION</text>
  <text x="640" y="497" class="label-sm" style="fill:#1E6A24">CC-BY-SA 4.0 — OPENPARTS / TRIPLE-R SERVICE CO.</text>
</svg>
