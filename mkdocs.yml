site_name: OpenParts
site_description: "Open-source mechanical parts database. Repair, Resilience, Regeneration."
site_url: https://openparts.rrrservice.co
repo_url: https://github.com/jlevers/openparts.rrrservice.co
repo_name: jlevers/openparts.rrrservice.co
copyright: "Triple-R Service Co. — CC-BY-SA 4.0"

theme:
  name: material
  palette:
    scheme: default
    primary: white
    accent: green
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/custom.css

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Machines:
    - machines/index.md
    - Tractors:
      - machines/tractors/index.md
      - Massey Ferguson:
        - machines/tractors/massey-ferguson/index.md
        - "362":
          - machines/tractors/massey-ferguson/362/index.md
          - Brakes: machines/tractors/massey-ferguson/362/brakes.md
  - Contributing: contributing.md
